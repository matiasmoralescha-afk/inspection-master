name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          pip install -e . -q
          pip install pytest -q

      - name: Compile check (catches SyntaxErrors)
        run: python -m compileall -q agent

      - name: Run tests
        run: pytest tests/ -v
